databaseChangeLog:
  - changeSet:
      id: 002-create-course-table
      author: nargiz
      changes:
        - createTable:
            tableName: courses
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: title
                  type: nvarchar(100)
                  constraints:
                    nullable: false